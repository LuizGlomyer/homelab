- name: Install needed packages
  ansible.builtin.apt:
    name:
      - samba
      - samba-client
      - wsdd
      - acl
      - python3-pexpect
    state: present


# Group creation
- name: Create admin group
  ansible.builtin.group:
    name: "{{ smb_admin_group }}"
    state: present

- name: Create domain groups
  ansible.builtin.group:
    name: "{{ item }}"
    state: present
  loop: "{{ smb_domain_groups }}"


- name: Initialize empty SMB unique users map
  ansible.builtin.set_fact:
    smb_unique_shares_by_user: {}

- name: Merge service shares into unique SMB user map
  ansible.builtin.set_fact:
    smb_unique_shares_by_user: "{{ smb_unique_shares_by_user | combine({ item.service_user: item }) }}"
  loop: "{{ smb_volumes | map(attribute='smb_shares') | list | flatten }}"
  loop_control:
    label: "{{ item.service_user }}"


# Per-volume mountpoints and disks
- name: Create SMB volume mountpoints
  ansible.builtin.file:
    path: "{{ item.smb_volume_root_path }}"
    state: directory
    owner: root
    group: "{{ smb_admin_group }}"
    mode: "2770"
  loop: "{{ smb_volumes }}"

- name: Mount SMB volume disks
  ansible.posix.mount:
    path: "{{ item.smb_volume_root_path }}"
    src: UUID={{ item.storage_uuid }}
    fstype: ext4
    opts: defaults,nofail
    state: mounted
  loop: "{{ smb_volumes }}"

# Users creation
- name: Create admin user
  ansible.builtin.user:
    name: "{{ smb_admin_user }}"
    group: "{{ smb_admin_group }}"
    shell: /bin/bash

- name: Set admin samba password
  ansible.builtin.expect:
    command: smbpasswd -a {{ smb_admin_user }}
    responses:
      New SMB password: "{{ vault_nas_admin_password }}"
      Retype new SMB password: "{{ vault_nas_admin_password }}"
  no_log: true

- name: Create service users
  ansible.builtin.user:
    name: "{{ item.service_user }}"
    group: "{{ item.domain_group }}"
    groups: "{{ item.domain_group }}"
    append: true
    shell: /usr/sbin/nologin
    create_home: false
  loop: "{{ smb_unique_shares_by_user.values() | list }}"
  loop_control:
    label: "{{ item.service_user }}"

- name: Set service users samba passwords
  ansible.builtin.expect:
    command: smbpasswd -a {{ item.service_user }}
    responses:
      New SMB password: "{{ item.service_password }}"
      Retype new SMB password: "{{ item.service_password }}"
  loop: "{{ smb_unique_shares_by_user.values() | list }}"
  loop_control:
    label: "{{ item.service_user }}"
  no_log: true



# Create share directories (after users exist so chown succeeds)
- name: Create share directories
  ansible.builtin.file:
    path: "{{ item.1.path }}"
    state: directory
    owner: "{{ item.1.service_user }}"
    group: "{{ item.1.domain_group | default(smb_admin_group) }}"
    mode: "2770"
  loop: "{{ smb_volumes | subelements('smb_shares', skip_missing=True) }}"
  loop_control:
    label: "{{ item.1.path }}"



# Apply ACL to volume roots
- name: Admin ACL recursive on each volume root
  ansible.posix.acl:
    path: "{{ item.smb_volume_root_path }}"
    entity: "{{ smb_admin_group }}"
    etype: group
    permissions: rwx
    recursive: true
    state: present
  loop: "{{ smb_volumes }}"

- name: Default admin ACL on each volume root
  ansible.posix.acl:
    path: "{{ item.smb_volume_root_path }}"
    entity: "{{ smb_admin_group }}"
    etype: group
    permissions: rwx
    default: true
    recursive: true
    state: present
  loop: "{{ smb_volumes }}"


- name: Allow domain groups to traverse shared directories
  ansible.posix.acl:
    path: "{{ item.1.path | dirname }}"
    entity: "{{ item.1.domain_group }}"
    etype: group
    permissions: --x
    state: present
  loop: "{{ smb_volumes | subelements('smb_shares', skip_missing=True) }}"
  when: item.1.domain_group is defined
  loop_control:
    label: "{{ item.1.path }}"

- name: Grant domain group access
  ansible.posix.acl:
    path: "{{ item.1.path }}"
    entity: "{{ item.1.domain_group }}"
    etype: group
    permissions: "{{ 'r-x' if item.1.read_only else 'rwx' }}"
    state: present
  loop: "{{ smb_volumes | subelements('smb_shares', skip_missing=True) }}"
  when: item.1.domain_group is defined
  loop_control:
    label: "{{ item.1.path }}"

- name: Default domain group ACL
  ansible.posix.acl:
    path: "{{ item.1.path }}"
    entity: "{{ item.1.domain_group }}"
    etype: group
    permissions: "{{ 'r-x' if item.1.read_only else 'rwx' }}"
    default: true
    state: present
  loop: "{{ smb_volumes | subelements('smb_shares', skip_missing=True) }}"
  when: item.1.domain_group is defined
  loop_control:
    label: "{{ item.1.path }}"


# Start services
- name: Enable wsdd service
  ansible.builtin.service:
    name: wsdd
    enabled: true
    state: started

- name: Deploy Samba config
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    mode: '0644'
  notify: Restart samba
