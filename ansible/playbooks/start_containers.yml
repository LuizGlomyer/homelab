- name: Extract system metadata
  hosts: [ServicesHost, RaspberryPi]
  become: true
  vars:
    container_tags:
      - adguard_home
      - dashy
      - diun
      - file_browser
      - glances
      - jellyfin
      - metube
      - navidrome
      - portainer
      - stirling_pdf
      - uptime_kuma
      - vaultwarden
      - vikunja
  roles:
    - role: extract_metadata
      tags: "{{ container_tags }}"

- name: Set up containerized services
  hosts: [ServicesHost]
  roles:
    - role: containers/dashy
      tags: dashy

    - role: containers/diun
      tags: diun

    - role: containers/glances
      tags: glances

    - role: containers/jellyfin
      tags: jellyfin

    - role: containers/metube
      tags: metube

    - role: containers/navidrome
      tags: navidrome

    - role: containers/portainer
      tags: portainer

    - role: containers/stirling_pdf
      tags: stirling_pdf

    - role: containers/uptime_kuma
      tags: uptime_kuma

    - role: containers/vaultwarden
      tags: vaultwarden

    - role: containers/vikunja
      tags: vikunja

- name: Set up containerized services
  hosts: [RaspberryPi]
  roles:
    - role: containers/adguard_home
      tags: adguard_home

    - role: containers/diun
      tags: diun

    - role: containers/file_browser
      tags: file_browser

    - role: containers/glances
      tags: glances

    # - role: containers/pihole
    #   tags: pihole


- name: Remove unused resources
  hosts: [ServicesHost, RaspberryPi]
  tasks:
    - name: Prune unused Docker images
      community.docker.docker_prune:
        images: true
        images_filters:
          dangling: false
          until: 24h
